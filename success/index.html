/* ===== POSTCARD BRAND REFRESH ===== */
:root{
  --poster-yellow:#F1E12E;
  --poster-outline:#000000;
  --sky:#DEAB8F;
  --sky-deep:#D49777;
  --sand:#F1E12E;
  --water:#2E5651;
  --water-deep:#1B281A;
  --pine:#354427;
  --pine-deep:#1B281A;
  --stone:#907060;
  --cream:#F8F3E7;
  --ink:#000000;
  --redfor:#F1E12E;
}
body,
button,
input,
select,
textarea,
h1,h2,h3,.brand,.btn,.eyebrow{
  font-family:'Poppins', Arial, sans-serif;
}
h1{
  color:var(--poster-yellow);
  font-weight:900;
  letter-spacing:-.02em;
  -webkit-text-stroke:2px var(--poster-outline);
  paint-order:stroke fill;
  text-shadow:3px 3px 0 var(--poster-outline),0 8px 24px rgba(0,0,0,.35);
}
.btn{
  background:var(--poster-yellow) !important;
  color:var(--poster-outline) !important;
  border:2px solid var(--poster-outline);
  box-shadow:0 6px 0 var(--poster-outline) !important;
}
.btn.secondary{
  background:transparent !important;
  color:var(--cream) !important;
  border-color:var(--poster-yellow) !important;
  box-shadow:none !important;
}
.brand span,
.eyebrow{
  color:var(--poster-yellow) !important;
}


/* ===== FINAL MAGAZINE BRAND SYSTEM ===== */
:root{
  --poster-yellow:#F1E12E;
  --mag-teal:#2B9B9A;
  --mag-teal-deep:#0B4A43;
  --mag-cream:#F7F7F3;
  --mag-warm:#D1AF72;
  --ink:#0B403A;
  --cream:#F7F7F3;
  --water:#2B9B9A;
  --water-deep:#0B4A43;
  --pine-deep:#0B4A43;
}
body{
  font-family:'Montserrat', Arial, sans-serif;
  background:var(--mag-teal-deep);
}
body p,
body li{
  text-transform:uppercase;
  letter-spacing:.045em;
  font-weight:600;
}
h1,h2,h3,.brand,.btn,.eyebrow{
  font-family:'Poppins', Arial, sans-serif;
}
h1{
  color:var(--poster-yellow);
}
.btn{
  background:var(--poster-yellow) !important;
  color:#000000 !important;
}


/* ===== EYEBROW CONTRAST UPDATE ===== */
.eyebrow,
.section-head .eyebrow,
.agent-block .eyebrow,
.hero .eyebrow,
#life .section-head .eyebrow,
#financing .section-head .eyebrow,
#contact .eyebrow{
  display:inline-flex;
  align-items:center;
  width:auto;
  max-width:max-content;
  color:#000000 !important;
  background:#F1E12E;
  border:2px solid #000000;
  border-radius:999px;
  padding:7px 13px;
  font-family:var(--body-font, 'Montserrat', Arial, sans-serif);
  font-weight:900;
  letter-spacing:.14em;
  text-transform:uppercase;
  text-shadow:none !important;
  box-shadow:3px 3px 0 rgba(0,0,0,.28);
}
.eyebrow::before,
.section-head .eyebrow::before,
.agent-block .eyebrow::before,
.hero .eyebrow::before,
#life .section-head .eyebrow::before,
#financing .section-head .eyebrow::before,
#contact .eyebrow::before{
  display:none !important;
  content:none !important;
}
@media(max-width:560px){
  .eyebrow,
  .section-head .eyebrow,
  .agent-block .eyebrow,
  .hero .eyebrow{
    font-size:.66rem;
    letter-spacing:.09em;
    padding:6px 10px;
  }
}


/* ===== FINANCING ROLE + HERO EYEBROW SPACING UPDATE ===== */

  box-shadow:none !important;
  padding:0 !important;
  max-width:none !important;
  display:block !important;
  text-shadow:none !important;
  letter-spacing:.14em;
}


/* ===== HERO ADDRESS / TOGGLE / NAV FIX ===== */
nav .links{
  gap:18px;
  min-width:0;
}
nav .links a{
  font-size:.76rem;
  white-space:nowrap;
}

}
@media(max-width:1180px){

  }
  nav .links a{
    font-size:.68rem;
    letter-spacing:.045em;
  }
  nav .nav-cta{
    padding:8px 12px;
  }
}
@media(max-width:980px){
  .burger{display:flex}
  nav .links{
    display:none;
    position:fixed;
    top:var(--navh,64px);
    left:0;
    right:0;
    flex-direction:column;
    align-items:stretch;
    gap:0;
    background:var(--cream);
    border-top:1px solid rgba(35,48,47,.12);
    box-shadow:0 18px 40px rgba(0,0,0,.22);
    max-height:calc(100vh - var(--navh,64px));
    overflow-y:auto;
    padding:8px 0 14px;
    z-index:50;
  }
  nav .links.open{display:flex}
  nav .links a{
    padding:15px 26px;
    opacity:1;
    border-bottom:1px solid rgba(35,48,47,.07);
    font-size:1rem;
    letter-spacing:.04em;
  }
  nav .links .nav-cta{
    margin:12px 26px 0;
    text-align:center;
    border-radius:3px;
  }
}

.hero .toggle button{

@media(max-width:760px){
  .hero .wrap{
    padding-top:34px;
  }

  }

  }
}
